name: Depoy React + Vite to Github Pages

on: 
  push:
    branches:
      - main

jobs: 
    build-delpoy: 
      runs-on: ubuntu-latest
       
      steps: 
        # Checkout the repository
        - name: Checkout code
          uses: actions/checkout@v3

        # Setup NodeJS
        - name: Setup Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 22

        #Install Dependncies
        - name: Install Dependncies
          run: npm install

        #Build the project
        - name: Build project
          run: npm run build

        #Deploy to github pages
        - name: Deploy to github pages
          uses: peaceiris/actions-gh-pages@v4
          with: 
              github_token: ${{ secrets.GITHUB_TOKEN }}
              publish_dir: ./dist